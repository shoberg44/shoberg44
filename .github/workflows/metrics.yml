name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Header (Minimal)
        uses: lowlighter/metrics@latest
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shoberg44
          template: classic
          base: header
          config_timezone: America/Detroit

      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          filename: github-stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shoberg44
          template: classic
          base: activity, community, repositories, metadata
          config_timezone: America/Detroit

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: github-languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shoberg44
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          config_timezone: America/Detroit

      - name: Topics (Skills)
        uses: lowlighter/metrics@latest
        with:
          filename: github-skills.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shoberg44
          template: classic
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          config_timezone: America/Detroit
